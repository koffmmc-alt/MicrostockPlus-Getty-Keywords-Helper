<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты — M+ Getty Keywords Helper</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="icon128.png">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="logo">
        <a href="index.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;">
          <img src="icon128.png" alt="Getty Keywords Helper" width="40" height="40" style="border-radius: 8px;">
          <span>M+ Getty Keywords Helper</span>
        </a>
      </div>
      <div class="header-right">
        <a href="index.html" class="header-link" data-lang-ru="На главную" data-lang-en="Home">На главную</a>
        <button class="lang-toggle" onclick="toggleLang()">EN</button>
      </div>
    </div>
  </header>

  <div class="privacy-content">
    <h1 data-lang-ru="Контакты" data-lang-en="Contact">Контакты</h1>

    <p data-lang-ru="Если у вас есть вопросы, предложения или нужна помощь — свяжитесь с разработчиком любым удобным способом:" data-lang-en="If you have questions, suggestions, or need help — reach out to the developer:">Если у вас есть вопросы, предложения или нужна помощь — свяжитесь с разработчиком любым удобным способом:</p>

    <div class="contact-cards">
      <a href="https://t.me/olegmankoff" target="_blank" class="contact-card">
        <div class="contact-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.2 5L2 12.3l6.5 2.5M21.2 5l-4.5 15-8.2-5.2M21.2 5L8.5 14.8M8.5 14.8V20l3.1-3.5"/>
          </svg>
        </div>
        <div class="contact-label">Telegram</div>
        <div class="contact-value">@olegmankoff</div>
      </a>

      <a href="mailto:mankovo@bk.ru" class="contact-card">
        <div class="contact-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M22 4L12 13 2 4"/>
          </svg>
        </div>
        <div class="contact-label">Email</div>
        <div class="contact-value">mankovo@bk.ru</div>
      </a>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 M+ Getty Keywords Helper</p>
      <p data-lang-ru="Не связано с Getty Images или Microstock Plus." data-lang-en="Not affiliated with Getty Images or Microstock Plus.">Not affiliated with Getty Images or Microstock Plus.</p>
    </div>
  </footer>

  <script>
    function toggleLang() {
      var current = localStorage.getItem('lang') || 'ru';
      setLang(current === 'ru' ? 'en' : 'ru');
    }

    function setLang(lang) {
      localStorage.setItem('lang', lang);
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-lang-' + lang + ']').forEach(function(el) {
        el.textContent = el.getAttribute('data-lang-' + lang);
      });
      document.querySelectorAll('.lang-toggle').forEach(function(btn) {
        btn.textContent = lang === 'ru' ? 'EN' : 'RU';
      });
      document.title = lang === 'ru'
        ? 'Контакты — M+ Getty Keywords Helper'
        : 'Contact — M+ Getty Keywords Helper';
    }

    setLang(localStorage.getItem('lang') || (navigator.language.startsWith('ru') ? 'ru' : 'en'));
  </script>
</body>
</html>
